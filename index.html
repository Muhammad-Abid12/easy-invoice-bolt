<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e40af" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Easy Invoice Manager - Professional Invoice Management for Pakistani Businesses. Create, manage, and track invoices with ease." />
    <meta name="keywords" content="invoice, billing, Pakistan, business, accounting, PDF invoice" />
    <meta name="author" content="Easy Invoice Manager" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Easy Invoice" />

    <!-- Open Graph -->
    <meta property="og:title" content="Easy Invoice Manager" />
    <meta property="og:description" content="Professional Invoice Management for Pakistani Businesses" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <title>Easy Invoice Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
